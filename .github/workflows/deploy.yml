name: Deploy to EC2 (systemd)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file from GitHub secrets
        run: |
          cat > .env <<EOF
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_AWS_STORAGE_BUCKET_NAME=${{ secrets.S3_AWS_STORAGE_BUCKET_NAME }}
          AWS_STORAGE_MEDIA_BUCKET_NAME=${{ secrets.AWS_STORAGE_MEDIA_BUCKET_NAME }}
          MEDIA_ACCESS_KEY=${{ secrets.MEDIA_ACCESS_KEY }}
          MEDIA_SECRET_ACCESS_KEY=${{ secrets.MEDIA_SECRET_ACCESS_KEY }}
          REDIRECT_URI=${{ secrets.REDIRECT_URI }}
          PIXELFED_REDIRECT_URI=${{ secrets.PIXELFED_REDIRECT_URI }}
          AWS_S3_REGION_NAME=${{ secrets.AWS_S3_REGION_NAME }}
          FACEBOOK_APP_ID=${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET=${{ secrets.FACEBOOK_APP_SECRET }}
          FACEBOOK_VERIFY_TOKEN=${{ secrets.FACEBOOK_VERIFY_TOKEN }}
          INSTAGRAM_BUSINESS_REDIRECT_URI=${{ secrets.INSTAGRAM_BUSINESS_REDIRECT_URI }}
          STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          DEBUG=False
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Upload .env to EC2
        run: |
          scp -i ~/.ssh/id_rsa .env ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/postflow/core/.env

      - name: Deploy
        run: |
          ssh ubuntu@${{ secrets.EC2_HOST }} << 'DEPLOY'
          set -e
          export PATH="$HOME/.local/bin:$PATH"
          cd /home/ubuntu/postflow

          echo "--- Pulling latest changes ---"
          git fetch origin main
          git reset --hard origin/main

          echo "--- Syncing Python dependencies ---"
          uv sync --frozen --no-dev

          echo "--- Building Tailwind CSS ---"
          cd theme/static_src && npm ci --silent && cd ../..
          .venv/bin/python manage.py tailwind build 2>&1 | tail -3

          echo "--- Running migrations ---"
          .venv/bin/python manage.py migrate --noinput

          echo "--- Collecting static files ---"
          .venv/bin/python manage.py collectstatic --noinput 2>&1 | tail -3

          echo "--- Installing systemd services ---"
          sudo cp systemd/postflow.target /etc/systemd/system/
          sudo cp systemd/postflow-web.service /etc/systemd/system/
          sudo cp systemd/postflow-scheduler.service /etc/systemd/system/
          sudo systemctl daemon-reload

          echo "--- Installing nginx config ---"
          sudo cp deploy/nginx-postflow.conf /etc/nginx/sites-available/postflow
          sudo ln -sf /etc/nginx/sites-available/postflow /etc/nginx/sites-enabled/postflow
          sudo rm -f /etc/nginx/sites-enabled/default

          echo "--- Starting/restarting systemd services ---"
          sudo systemctl enable postflow.target
          sudo systemctl restart postflow.target

          echo "--- Starting/reloading nginx ---"
          sudo systemctl enable nginx
          sudo nginx -t && sudo systemctl restart nginx

          echo "--- Enabling certbot auto-renewal ---"
          sudo systemctl enable certbot.timer
          sudo systemctl start certbot.timer

          echo "--- Verifying services ---"
          sleep 3
          sudo systemctl is-active postflow-web.service
          sudo systemctl is-active postflow-scheduler.service
          sudo systemctl is-active nginx

          echo "--- Deploy complete ---"
          DEPLOY
