<div class="max-w-4xl mx-auto p-4">
    <h1 class="text-2xl font-bold text-gray-900 mb-4">Library</h1>

    <div class="flex gap-1 border-b mb-4">
        <a href="{% url 'library' %}?tab=hashtags"
           hx-get="{% url 'library' %}?tab=hashtags"
           hx-target="#library-content" hx-swap="innerHTML"
           class="px-4 py-2 text-sm font-medium border-b-2 {% if active_tab == 'hashtags' %}border-violet-600 text-violet-600{% else %}border-transparent text-gray-500 hover:text-gray-700{% endif %}">
            Hashtags
        </a>
        <a href="{% url 'library' %}?tab=templates"
           hx-get="{% url 'library' %}?tab=templates"
           hx-target="#library-content" hx-swap="innerHTML"
           class="px-4 py-2 text-sm font-medium border-b-2 {% if active_tab == 'templates' %}border-violet-600 text-violet-600{% else %}border-transparent text-gray-500 hover:text-gray-700{% endif %}">
            Templates
        </a>
        <a href="{% url 'library' %}?tab=rss"
           hx-get="{% url 'library' %}?tab=rss"
           hx-target="#library-content" hx-swap="innerHTML"
           class="px-4 py-2 text-sm font-medium border-b-2 {% if active_tab == 'rss' %}border-violet-600 text-violet-600{% else %}border-transparent text-gray-500 hover:text-gray-700{% endif %}">
            RSS Feeds
        </a>
    </div>

    <div id="library-content"
         hx-get="{% url 'library' %}?tab={{ active_tab }}"
         hx-target="this" hx-swap="innerHTML" hx-trigger="load once">
        <p class="text-gray-400 text-sm p-4">Loading...</p>
    </div>
</div>
