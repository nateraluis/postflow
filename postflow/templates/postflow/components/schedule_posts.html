{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-semibold text-gray-900">Upcoming Posts</h2>
    <a href="{% url 'compose' %}" hx-get="{% url 'compose' %}" hx-target="#content-area" hx-swap="innerHTML"
       class="text-sm text-violet-600 hover:underline">New Post</a>
  </div>

  <div id="calendar" class="border rounded-xl p-4">
    <div id="calendar-view-container">
      {% include 'postflow/components/calendar.html' with scheduled_posts=scheduled_posts %}
    </div>
  </div>
</div>
{% endblock %}
