{% block content %}
<div class="max-w-4xl mx-auto">
  <!-- Title -->
  <h1 class="text-2xl font-bold text-gray-900 mb-1">Hashtag Groups</h1>
  <p class="text-sm text-gray-500 mb-6">Organize your hashtags into reusable groups.</p>

  <!-- Hashtag Group Form -->
  <div id="hashtags-groups-form">
    {% include 'postflow/components/hashtags_groups_form.html' %}
  </div>

  <!-- Container for Hashtag Groups -->
  <div id="hashtags-groups-container"
     hx-get="{% url 'hashtag-groups-list' %}" 
     hx-trigger="load" 
     hx-target="this"
     hx-swap="innerHTML">
    <p class="text-gray-500">Loading hashtag groups...</p>
  </div>
</div>
{% endblock %}
