{% load static %}

<div class="p-4 border border-gray-200 rounded-xl bg-white" id="group-{{ group.id }}">
  <div class="flex justify-between items-center mb-2">
    <h3 class="text-sm font-semibold text-gray-900">{{ group.name }}</h3>
    <button
      class="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors"
      onclick="copyHashtags('{{ group.id }}')"
      title="Copy Hashtags">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
      </svg>
    </button>
  </div>

  <div class="flex flex-wrap gap-1.5" id="hashtags-{{ group.id }}">
    {% for tag in group.tags.all %}
      <span class="inline-block bg-violet-50 text-violet-700 text-xs font-medium px-2 py-1 rounded-md">
        {{ tag.display_name }}
      </span>
    {% endfor %}
  </div>
</div>
